<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1f3a2b" />
<meta name="description" content="FORGE builds you a complete training program from your goals, your equipment and your schedule, then tracks every lift as you get stronger." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="assets/favicon-96.png" sizes="96x96" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="FORGE" />
<title>FORGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f1ece1;
    --surface:#ffffff;
    --surface-2:#f7f3ea;
    --ink:#17150f;
    --ink-2:#5b554a;
    --faint:#9a9385;
    --line:#e7e0d1;
    --line-2:#efe9db;
    --brand:#1f3a2b;
    --brand-2:#2a5240;
    --accent:#df5a2a;
    --accent-2:#ef6f3d;
    --accent-soft:rgba(223,90,42,.10);
    --gold:#c79a3f;
    --slate:#3b4250;
    --upper:#1f3a2b;
    --lower:#c0552b;
    --full:#3b4250;
    --core:#7a7468;
    --r:14px;
    --shadow:0 12px 34px -16px rgba(40,28,12,.4);
    --shadow-sm:0 3px 12px -6px rgba(40,28,12,.35);
    --fd:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --fb:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --nav-h:64px;
    --maxw:680px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--fb);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
    background:var(--bg);min-height:100vh;
  }
  .app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg);
    position:relative;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px)}
  ::selection{background:var(--accent);color:#fff}
  input{font-family:var(--fb)}

  /* App bar */
  .appbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:18px 20px 12px}
  .appbar .brand{display:flex;align-items:center;gap:10px}
  .appbar .mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#f1ece1;
    display:grid;place-items:center;font-family:var(--fd);font-weight:900;font-size:18px}
  .appbar .bn{font-family:var(--fd);font-weight:800;letter-spacing:.16em;font-size:17px}
  .appbar .ctx{font-family:var(--fd);font-weight:800;font-size:27px;letter-spacing:-.02em;margin:14px 0 0;line-height:1.05}
  .appbar .sub{color:var(--ink-2);font-size:14.5px;margin-top:5px;max-width:90%}

  .view{padding:6px 20px 8px;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .klabel{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--faint);font-weight:700;margin:22px 0 12px}
  .klabel:first-child{margin-top:8px}

  /* Tip card */
  .tip{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:14px 15px;margin:14px 0;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .tip:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .tip .ti{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:var(--accent-soft);display:grid;place-items:center;margin-left:4px}
  .tip b{display:block;font-size:13.5px;font-weight:700;margin-bottom:2px}
  .tip span{font-size:13px;color:var(--ink-2);line-height:1.45}

  /* Buttons */
  .btn{display:flex;width:100%;align-items:center;justify-content:center;gap:9px;
    background:var(--brand);color:#f3efe4;border:none;padding:16px;border-radius:13px;
    font-size:16px;font-weight:700;cursor:pointer;font-family:var(--fb);box-shadow:var(--shadow-sm);transition:.16s}
  .btn:active{transform:scale(.99)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.accent{background:var(--accent)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .stick{margin-top:20px;margin-bottom:4px}

  /* Goal cards */
  .goal{position:relative;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;
    padding:18px;margin-bottom:13px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm);display:flex;gap:15px;align-items:flex-start}
  .goal:active{transform:scale(.995)}
  .goal.sel{border-color:var(--accent)}
  .goal .gic{flex-shrink:0;width:58px;height:58px;border-radius:13px;background:var(--surface-2);display:grid;place-items:center;border:1px solid var(--line-2)}
  .goal.sel .gic{background:var(--accent-soft);border-color:transparent}
  .goal h3{font-family:var(--fd);margin:1px 0 5px;font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px}
  .goal .gtag{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--accent);text-transform:uppercase}
  .goal p{margin:7px 0 0;color:var(--ink-2);font-size:13.5px;line-height:1.5}
  .goal .chk{position:absolute;top:15px;right:15px;width:22px;height:22px;border-radius:50%;background:var(--accent);
    color:#fff;display:none;place-items:center;font-weight:800;font-size:12px}
  .goal.sel .chk{display:grid}

  /* Equipment */
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .chip{background:var(--surface);border:1px solid var(--line);color:var(--ink-2);padding:9px 14px;border-radius:999px;
    font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
  .chip:active{transform:scale(.97)}
  .egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media(max-width:420px){.egrid{grid-template-columns:repeat(2,1fr)}}
  .eq{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:14px 8px;text-align:center;
    cursor:pointer;position:relative;box-shadow:var(--shadow-sm);transition:.14s;user-select:none}
  .eq:active{transform:scale(.97)}
  .eq.sel{border-color:var(--accent);background:linear-gradient(180deg,var(--surface),var(--accent-soft))}
  .eq .ei{height:40px;display:grid;place-items:center;margin-bottom:7px}
  .eq .en{font-size:11.5px;font-weight:600;line-height:1.25}
  .eq .chk{position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:50%;background:var(--accent);
    color:#fff;display:none;place-items:center;font-weight:800;font-size:10px}
  .eq.sel .chk{display:grid}
  .eq.lock{opacity:.6}
  .eqcount{font-size:13px;color:var(--faint);margin-top:16px;text-align:center;font-weight:500}
  .eqcount b{color:var(--accent)}
  .counter{display:flex;align-items:center;gap:15px;background:var(--brand);color:#f3efe4;border-radius:14px;padding:15px 18px;margin:2px 0 16px;box-shadow:var(--shadow-sm)}
  .counter .cn{font-family:var(--fd);font-weight:800;font-size:36px;line-height:1;min-width:48px;text-align:center}
  .counter .ctx2{font-size:13.5px;line-height:1.35}
  .counter .ctx2 b{font-weight:700}
  .counter .ctx2 span{opacity:.78;font-size:12.5px}

  /* Days */
  .dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .dopt{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:18px 8px;text-align:center;
    cursor:pointer;box-shadow:var(--shadow-sm);transition:.14s}
  .dopt:active{transform:scale(.97)}
  .dopt.sel{border-color:var(--accent);background:linear-gradient(180deg,var(--surface),var(--accent-soft))}
  .dopt .dn{font-family:var(--fd);font-size:30px;font-weight:800;line-height:1}
  .dopt .dl{font-size:11px;color:var(--ink-2);margin-top:5px;font-weight:500}
  .splitbox{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm)}
  .splitbox h4{font-family:var(--fd);margin:0 0 12px;font-size:15px;font-weight:800}
  .splitrow{display:flex;flex-direction:column;gap:8px}
  .spill{display:flex;align-items:center;gap:11px;font-size:14px;padding:9px 12px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line-2)}
  .spill .sd{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-family:var(--fd);font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
  .spill b{font-weight:700}
  .spill small{color:var(--faint);margin-left:auto;font-size:11.5px}

  /* Train day tabs */
  .daytabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin:0 -20px;padding-left:20px;padding-right:20px;scrollbar-width:none}
  .daytabs::-webkit-scrollbar{display:none}
  .dtab{flex-shrink:0;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 14px;cursor:pointer;
    box-shadow:var(--shadow-sm);min-width:84px}
  .dtab .dt-d{font-family:var(--fd);font-weight:800;font-size:14px}
  .dtab .dt-n{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:1px}
  .dtab.sel{background:var(--brand);border-color:transparent}
  .dtab.sel .dt-d{color:#fff}
  .dtab.sel .dt-n{color:rgba(255,255,255,.7)}

  /* Exercise card */
  .ex{background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .ex-fig{height:184px;background:radial-gradient(160px 140px at 50% 42%,rgba(223,90,42,.07),transparent 70%),var(--surface-2);
    display:grid;place-items:center;position:relative;border-bottom:1px solid var(--line-2)}
  .ex-fig .badge{position:absolute;top:11px;left:11px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 9px;border-radius:6px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}
  .ex-fig .tone{position:absolute;top:11px;right:11px;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    padding:4px 8px;border-radius:6px;background:var(--gold);color:#3a2c08}
  .ex-b{padding:16px 17px}
  .ex-h{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .ex-nm{font-family:var(--fd);font-size:19px;font-weight:800;margin:0;line-height:1.12;letter-spacing:-.01em}
  .ex-tg{font-size:11.5px;color:var(--accent);font-weight:700;margin-top:4px}
  .ex-eq{font-size:11.5px;color:var(--faint);margin-top:2px;font-weight:500}
  .ex-sr{flex-shrink:0;text-align:center;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:7px 11px}
  .ex-sr .b{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--brand)}
  .ex-sr .l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:700}
  .cues{margin-top:13px;display:grid;gap:8px}
  .cue{display:flex;gap:10px;font-size:13.5px}
  .cue .n{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:10.5px;font-weight:800;color:var(--brand);margin-top:1px}
  .cue span{color:var(--ink-2)}
  .feel{margin-top:13px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:10px 12px}
  .feel b{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:800;display:block;margin-bottom:3px}
  .feel span{font-size:13px;color:var(--ink-2)}

  /* Tracking */
  .track{margin-top:14px;border-top:1px dashed var(--line);padding-top:13px}
  .track-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .track-top .tt{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--ink-2)}
  .track-top .last{font-size:12px;color:var(--faint);font-weight:600}
  .track-top .last b{color:var(--brand)}
  .track-row{display:flex;gap:8px;align-items:center}
  .tin{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-weight:600;color:var(--ink);outline:none}
  .tin:focus{border-color:var(--accent)}
  .txx{color:var(--faint);font-weight:700;font-size:14px}
  .tlog{flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fb)}
  .tlog:active{transform:scale(.97)}
  .spark{margin-top:10px;display:flex;align-items:center;gap:10px}
  .spark svg{flex-shrink:0}
  .spark .sk{font-size:11.5px;color:var(--faint)}
  .advice{margin-top:11px;font-size:12.5px;border-radius:10px;padding:10px 12px;line-height:1.45;font-weight:500;display:flex;gap:8px;align-items:flex-start}
  .advice .ai{flex-shrink:0;font-weight:800}
  .advice.warn{background:rgba(223,90,42,.10);border:1px solid rgba(223,90,42,.32);color:#a4421b}
  .advice.up{background:rgba(60,110,122,.12);border:1px solid rgba(60,110,122,.32);color:#2f5560}
  .advice.good{background:rgba(31,58,43,.09);border:1px solid rgba(31,58,43,.22);color:#234433}

  .swapwrap{margin-top:12px}
  .swap-btn{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);padding:11px;border-radius:11px;
    font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fb)}
  .swap-btn:active{transform:scale(.99)}
  .swap-btn svg{width:15px;height:15px}
  .swap-menu{margin-top:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:7px;display:none}
  .swap-menu.open{display:block;animation:fade .2s ease}
  .swap-menu .smh{font-size:10.5px;color:var(--faint);padding:7px 8px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
  .so{display:flex;align-items:center;gap:11px;padding:8px;border-radius:9px;cursor:pointer}
  .so:active{background:var(--surface)}
  .so .sf{width:46px;height:46px;background:var(--surface);border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;flex-shrink:0;overflow:hidden}
  .so .sn{font-weight:700;font-size:13.5px}
  .so .se{font-size:11px;color:var(--faint)}

  /* Progress */
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
  .pcard .ph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .pcard .pn{font-family:var(--fd);font-weight:800;font-size:15.5px}
  .pcard .pb{font-size:12px;color:var(--faint);font-weight:600}
  .pcard .pb b{color:var(--accent);font-size:14px}
  .empty{text-align:center;padding:50px 24px;color:var(--ink-2)}
  .empty .ei2{width:62px;height:62px;border-radius:16px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 16px}
  .empty h3{font-family:var(--fd);font-size:19px;margin:0 0 6px}
  .empty p{font-size:14px;margin:0;color:var(--faint)}

  /* Home / landing page */
  body.home .appbar .ctx,body.home .appbar .sub{display:none}
  body.home .navwrap{display:none}
  .home-intro{padding:2px 2px 24px}
  .home-mark{width:52px;height:52px;border-radius:15px;background:var(--brand);color:#f1ece1;display:grid;place-items:center;
    font-family:var(--fd);font-weight:900;font-size:26px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
  .home-intro h1{font-family:var(--fd);font-size:29px;font-weight:800;letter-spacing:-.02em;margin:0 0 10px;line-height:1.08}
  .home-intro p{color:var(--ink-2);font-size:15px;line-height:1.6;margin:0}
  .home-carousel-wrap{position:relative;margin:0 -20px 18px}
  .home-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    gap:14px;padding:4px 20px 14px;scrollbar-width:none}
  .home-carousel::-webkit-scrollbar{display:none}
  .hslide{flex:0 0 100%;scroll-snap-align:center;background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:24px 22px 22px;box-shadow:var(--shadow-sm);min-height:230px;display:flex;flex-direction:column}
  .hslide .hs-ico{width:48px;height:48px;border-radius:13px;background:var(--accent-soft);display:grid;place-items:center;margin-bottom:16px;flex-shrink:0}
  .hslide .hs-n{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .hslide h3{font-family:var(--fd);font-size:19.5px;font-weight:800;margin:0 0 10px;letter-spacing:-.01em}
  .hslide p{color:var(--ink-2);font-size:14px;line-height:1.62;margin:0}
  .hnav{position:absolute;top:50%;transform:translateY(calc(-50% - 7px));width:34px;height:34px;border-radius:50%;background:var(--surface);
    border:1px solid var(--line);box-shadow:var(--shadow-sm);display:grid;place-items:center;cursor:pointer;z-index:2;color:var(--ink)}
  .hnav.prev{left:4px} .hnav.next{right:4px}
  .hnav svg{width:17px;height:17px}
  .hdots{display:flex;justify-content:center;gap:7px;margin:0 0 20px}
  .hdot{width:7px;height:7px;border-radius:50%;background:var(--line);cursor:pointer;transition:.2s ease;padding:0;border:none}
  .hdot.on{background:var(--accent);width:22px;border-radius:5px}

  /* Bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;max-width:var(--maxw);margin:0 auto}
  .navwrap{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;pointer-events:none}
  .nav{pointer-events:auto;position:relative}
  .nbtn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    cursor:pointer;color:var(--faint);font-family:var(--fb);font-size:10px;font-weight:600;padding-top:9px}
  .nbtn svg{width:23px;height:23px;stroke-width:2}
  .nbtn.act{color:var(--accent)}
  .nbtn .ndot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;margin-top:1px}
  .nbtn.act .ndot{opacity:1}

  /* Day progress */
  .dayprog{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .dayprog .dp-t{font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:8px}
  .dayprog .dp-bar{height:7px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line-2);overflow:hidden}
  .dayprog .dp-bar i{display:block;height:100%;background:var(--brand-2);border-radius:99px;transition:width .4s ease}
  .exdone{color:var(--brand);font-size:16px;vertical-align:2px}

  /* Rest timer pill */
  .rest{position:fixed;bottom:calc(var(--nav-h) + 74px);left:50%;transform:translateX(-50%);z-index:55;display:none;
    align-items:center;gap:9px;background:var(--brand);color:#f3efe4;border:none;border-radius:999px;padding:10px 18px;
    font-family:var(--fb);font-size:13.5px;font-weight:600;box-shadow:var(--shadow);cursor:pointer}
  .rest.on{display:flex}
  .rest b{font-family:var(--fd);font-size:16px;font-weight:800;min-width:38px;text-align:center}
  .rest .sk2{opacity:.65;font-size:11px}

  /* Progress stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 8px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat b{display:block;font-family:var(--fd);font-size:24px;font-weight:800;color:var(--brand)}
  .stat span{font-size:11px;color:var(--faint);font-weight:600}

  /* Profile (You page) */
  .prof{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
  .prof-h{font-family:var(--fd);font-weight:800;font-size:16px;display:flex;flex-direction:column}
  .prof-h .prof-sub{font-family:var(--fb);font-weight:500;font-size:12px;color:var(--faint);margin-top:2px}
  .sexrow{display:flex;gap:8px;margin:12px 0 4px}
  .sexb{flex:1;background:var(--surface-2);border:1.5px solid var(--line);border-radius:10px;padding:9px;font-size:13px;font-weight:700;color:var(--ink-2);cursor:pointer;font-family:var(--fb)}

  .hgrp{display:flex;gap:6px}
  .pin{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;font-weight:600;color:var(--ink);outline:none;font-family:var(--fb)}
  .pin:focus{border-color:var(--accent)}
  .wlog{flex-shrink:0;background:var(--brand);color:#f3efe4;border:none;border-radius:10px;padding:0 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fb)}
  .bmirow{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:13px;color:var(--ink-2)}
  .bmirow b{color:var(--ink);font-family:var(--fd);font-size:15px}

  .bwtrend{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  .bwt-h{display:flex;justify-content:space-between;font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--faint);margin-bottom:4px}
  .bwt-h span{text-transform:none;letter-spacing:0;color:var(--brand-2);font-weight:700}

  /* Weight tracker (Profile tab) */
  .wtrack{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
  .wt-h{font-family:var(--fd);font-weight:800;font-size:16px;margin-bottom:12px}
  .wt-now{display:flex;align-items:flex-end;gap:18px;margin-bottom:12px}
  .wt-cur b{font-family:var(--fd);font-size:34px;font-weight:800;line-height:1;color:var(--ink)}
  .wt-cur span{font-size:12px;color:var(--faint);font-weight:600;margin-left:4px}
  .wt-chg{display:flex;flex-direction:column;font-family:var(--fd);font-weight:800;font-size:16px;padding-bottom:2px}
  .wt-chg span{font-family:var(--fb);font-size:10.5px;font-weight:600;color:var(--faint)}
  .wt-chg.down{color:var(--brand-2)} .wt-chg.up{color:var(--accent)}
  .wt-row{display:flex;gap:8px;margin-bottom:9px}
  .wt-row .pin{flex:1}
  .ghostbtn{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .goalprog{margin:6px 0 12px}
  .gp-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .gp-bar{height:9px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line-2);overflow:hidden}
  .gp-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand-2),var(--accent));border-radius:99px;transition:width .4s ease}
  .gp-lab{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);font-weight:600;margin-top:4px}
  .wt-empty{font-size:13px;color:var(--faint);text-align:center;padding:16px 8px;background:var(--surface-2);border-radius:11px;margin-top:6px}

  /* Session bar (Start / End workout) */
  .sessbar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
  .sessbar.on{background:var(--brand);border-color:transparent}
  .sess-l{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .sess-k{font-size:11.5px;font-weight:600;color:var(--faint)}
  .sessbar.on .sess-k{color:rgba(243,239,228,.7)}
  .sess-l b{font-family:var(--fd);font-weight:800;font-size:20px;color:var(--ink)}
  .sessbar.on .sess-l b{color:#f3efe4}
  .sess-cal{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:99px}
  .sess-start,.sess-end{margin-left:auto;border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--fb)}
  .sess-start{background:var(--accent);color:#fff}
  .sess-end{background:#f3efe4;color:var(--brand)}

  /* Favorite star */
  .favb{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line);
    display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-sm);padding:0}
  .favb.on{background:var(--accent-soft);border-color:transparent}
  .favb svg{display:block}

  .toast{position:fixed;bottom:calc(var(--nav-h) + 22px);left:50%;transform:translateX(-50%) translateY(16px);
    background:var(--brand);color:#f3efe4;padding:12px 20px;border-radius:11px;box-shadow:var(--shadow);font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.3s;z-index:60;max-width:84%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  svg.fig{display:block}
</style>
</head>

const EX=[
  /* CHEST */
  {id:'pushup',name:'Push Up',group:'chest',region:'upper',part:'Mid Chest',need:[],pose:'pushup',compound:true,

  {id:'db_bench',name:'Dumbbell Bench Press',group:'chest',region:'upper',part:'Mid Chest',need:['dumbbells','bench'],pose:'bench',compound:true,

  {id:'bb_bench',name:'Barbell Bench Press',group:'chest',region:'upper',part:'Mid Chest',need:['barbell','bench'],pose:'bench',compound:true,

  {id:'incline_db',name:'Incline Dumbbell Press',group:'chest',region:'upper',part:'Upper Chest',need:['dumbbells','bench'],pose:'incline',compound:true,

  {id:'pec_deck',name:'Pec Deck Fly',group:'chest',region:'upper',part:'Inner Chest',need:['pecdeck'],pose:'fly',compound:false,
   form:['Forearms on the pads, bring them together in front of you.','Pause and squeeze, then open slowly.'],feel:'Inner chest, very directly.'},
  {id:'dip_chest',name:'Chest Dip',group:'chest',region:'upper',part:'Lower Chest',need:['dipbar'],pose:'dip',compound:true,
   form:['Lean your torso forward over the bars.','Lower until you feel a stretch, then press back up.'],feel:'Lower chest and triceps.'},

  /* BACK */
  {id:'pullup',name:'Pull Up',group:'back',region:'upper',part:'Back Width',need:['pullup'],pose:'pullup',compound:true,
   form:['Hang with hands shoulder width, palms facing away.','Pull your chest toward the bar by driving your elbows down.'],feel:'Lats (the wings of your back) and biceps.'},
  {id:'lat_pulldown',name:'Lat Pulldown',group:'back',region:'upper',part:'Back Width',need:['latpulldown'],pose:'latpulldown',compound:true,
   form:['Grip wider than your shoulders and pull the bar to your upper chest.','Lead with the elbows and squeeze at the bottom.'],feel:'Lats and the sides of your upper back.'},
  {id:'db_row',name:'Single Arm Dumbbell Row',group:'back',region:'upper',part:'Mid Back',need:['dumbbells'],pose:'row',compound:true,

  {id:'bb_row',name:'Barbell Row',group:'back',region:'upper',part:'Mid Back',need:['barbell'],pose:'row',compound:true,

  {id:'landmine_row',name:'Landmine Row',group:'back',region:'upper',part:'Mid Back',need:['landmine'],pose:'landmine',compound:true,

  {id:'wrist_curl',name:'Wrist Curl',group:'forearms',region:'upper',part:'Forearms',need:['dumbbells'],pose:'wrist',compound:false,toning:true,

  {id:'goblet_squat',name:'Goblet Squat',group:'quads',region:'lower',part:'Quads and Glutes',need:['dumbbells'],pose:'squat',compound:true,

  {id:'kb_goblet',name:'Kettlebell Goblet Squat',group:'quads',region:'lower',part:'Quads and Glutes',need:['kettlebell'],pose:'squat',compound:true,

  {id:'leg_press',name:'Leg Press',group:'quads',region:'lower',part:'Quads and Glutes',need:['legpress'],pose:'legpress',compound:true,

  {id:'leg_ext',name:'Leg Extension',group:'quads',region:'lower',part:'Quad Sweep',need:['legextm'],pose:'legext',compound:false,

/* ---------------- HELPERS ---------------- */
function haveEquip(ex){return ex.need.every(n=>state.equip.has(n));}
function exById(id){return EX.find(e=>e.id===id);}
const HEAVY=['bb_squat','bb_bench','bb_ohp','deadlift','rdl_bb','trapbar_dl','good_morning','bb_row'];
const MACHK=['latpulldown','legpress','smith','legcurlm','legextm','hipthrustm','pecdeck','shoulderm','abductor','calfm','cable','preacher'];
/* what the figure should hold for this exercise */
function loadOf(ex){
  if(ex.need.some(x=>['barbell','ezbar','trapbar','smith','landmine'].includes(x)))return 'bar';
  if(ex.need.includes('kettlebell'))return 'kb';
  if(ex.need.includes('cable'))return 'cable';
  return 'db';
}
/* cable machine post with a pulley, drawn at the given side */
function cablePost(px,py1,py2,pulleyY){
  return eql(px,py1,px,py2,6)+'<circle cx="'+px+'" cy="'+pulleyY+'" r="3.5" fill="'+EQL+'"/>';
}
function setsReps(ex){
  // Timed holds and carries are measured in seconds, not reps
  if(ex.timed){
    if(ex.id==='jump_rope') return {sets:3,hold:'60 to 90 sec',timed:true};
    if(ex.id==='farmer_carry') return {sets:3,hold:'30 to 45 sec',timed:true};
    return {sets:3,hold:'30 to 60 sec',timed:true};
  }
  // Heavy barbell basics: squat, deadlift, bench, OHP, row (strength range)
  if(HEAVY.includes(ex.id))
    return {sets:4,reps:'5 to 8'};
  // Calves need higher reps to respond
  if(ex.group==='calves') return {sets:4,reps:'15 to 20'};
  // Core stability and endurance
  if(ex.group==='core') return {sets:3,reps:'12 to 20'};
  // Detail and toning work
  if(ex.toning) return {sets:3,reps:'12 to 20'};
  // Standard compound
  if(ex.compound) return {sets:4,reps:'6 to 12'};
  // Isolation
  return {sets:3,reps:'10 to 15'};
}
/* ---- exercise metric mode: timed (sec), bodyweight (reps only), or weighted ---- */
const BW_EQUIP=new Set(['bodyweight','pullup','dipbar','box','trx','jumprope']);
function isBodyweight(ex){return ex.need.every(n=>BW_EQUIP.has(n));}
function exMetric(ex){return ex.timed?'secs':(isBodyweight(ex)?'reps':'w');}
function srTarget(sr){return sr.timed?{val:sr.hold,label:'hold'}:{val:sr.reps,label:'reps'};}
function midOf(str){const m=(str||'').match(/(\d+)\D+(\d+)/);return m?(+m[1]+ +m[2])/2:12;}
function fmtEntry(ex,e){if(!e)return'';if(ex.timed)return (e.secs||0)+' sec';if(isBodyweight(ex))return (e.reps||0)+' reps';return e.w+' lb x '+e.reps;}
/* ---- favorites ---- */
function isFav(id){return state.favorites.has(id);}
function toggleFav(id){if(state.favorites.has(id))state.favorites.delete(id);else state.favorites.add(id);save();}
/* ---- body stats + calories ---- */
function bodyKg(){const lb=+state.profile.weightLb||175;return lb*0.4536;}
function bmiOf(){const w=+state.profile.weightLb,h=+state.profile.heightIn;if(!w||!h)return null;return (w/(h*h))*703;}
function metFor(ex){if(ex.timed)return ex.id==='jump_rope'?11:3.8;return (HEAVY.includes(ex.id)||ex.compound)?5.5:4;}
/* estimate work-seconds for one set of a given exercise */
function workSecPerSet(ex){if(ex.timed)return midOf(setsReps(ex).hold)+12;return HEAVY.includes(ex.id)?45:32;}
/* build a whole-day pacing plan targeting ~45 minutes total (work + rest),
   scaling each lift's rest proportionally, and estimate calories burned */
function planDay(day){
  const kg=bodyKg(),target=45*60;
  let workSec=0,baseRest=0,restCount=0;const perEx={};
  day.slots.forEach(id=>{const ex=exById(id);if(!ex)return;const sr=setsReps(ex),sets=sr.sets,wps=workSecPerSet(ex),br=restFor(ex);
    workSec+=sets*wps;baseRest+=sets*br;restCount+=sets;perEx[id]={sets,wps,br};});
  const restBudget=Math.max(target-workSec,restCount*25);
  const scale=baseRest>0?restBudget/baseRest:1;
  let totalRest=0;
  day.slots.forEach(id=>{const p=perEx[id];if(!p)return;p.rest=Math.max(25,Math.min(210,Math.round(p.br*scale)));totalRest+=p.sets*p.rest;});
  const minutes=Math.round((workSec+totalRest)/60);
  const kcal=Math.round(sessionMET(day)*kg*(minutes/60));
  return {perEx,minutes,kcal};
}
/* whole-session average MET (includes elevated burn through rest); heavier,
   more compound days run hotter */
function sessionMET(day){
  const n=Math.max(1,day.slots.length);
  const comp=day.slots.filter(id=>{const e=exById(id);return e&&(HEAVY.includes(e.id)||e.compound);}).length/n;
  return 4.2+comp*1.3; // ~4.2 (isolation) to ~5.5 (heavy compound)
}
function currentRest(ex){const s=state.session;if(s&&s.plan&&s.plan.perEx[ex.id])return s.plan.perEx[ex.id].rest;return restFor(ex);}
function availableFor(g){return EX.filter(e=>e.group===g&&haveEquip(e));}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setupDone(){return state.goal&&state.days;}

/* =========================================================
   FIGURE ANIMATIONS  (SVG + SMIL, articulated joints)
   ========================================================= */
/* filled-capsule figure (limbs are <rect rx> shapes, not lines) */
const FIG='#34353c',FIGL='#5a5b66',WGT='#c75c2c',WGT2='#9c4421',EQF='#3f7fa6',EQL='#aab2bb';
function _seg(x1,y1,x2,y2,w,fill){
  const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx)*180/Math.PI,r=w/2;
  return '<rect x="'+x1+'" y="'+(y1-r).toFixed(2)+'" width="'+l.toFixed(2)+'" height="'+w+'" rx="'+r+'" fill="'+fill+'" transform="rotate('+a.toFixed(2)+','+x1+','+y1+')"/>';
}
function lb(x1,y1,x2,y2,w){return _seg(x1,y1,x2,y2,w||6,FIG);}
function cap(x1,y1,x2,y2){return _seg(x1,y1,x2,y2,12,FIG);}
function head(cx,cy,dir){
  let n='';
  if(dir==='r')n='<path d="M'+(cx+5)+' '+(cy-6)+' L'+(cx+12)+' '+(cy+2)+' L'+(cx+5)+' '+(cy+2)+' Z" fill="'+FIG+'"/>';
  else if(dir==='l')n='<path d="M'+(cx-5)+' '+(cy-6)+' L'+(cx-12)+' '+(cy+2)+' L'+(cx-5)+' '+(cy+2)+' Z" fill="'+FIG+'"/>';
  else if(dir==='u')n='<path d="M'+(cx-6)+' '+(cy-5)+' L'+(cx+2)+' '+(cy-12)+' L'+(cx+2)+' '+(cy-5)+' Z" fill="'+FIG+'"/>';
  else if(dir==='d')n='<path d="M'+(cx+6)+' '+(cy+5)+' L'+(cx-2)+' '+(cy+12)+' L'+(cx-2)+' '+(cy+5)+' Z" fill="'+FIG+'"/>';
  return '<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="'+FIG+'"/>'+n;
}
function torso(cx,topY,h,sw,ww){var a=cx-sw/2,b2=cx+sw/2,c=cx+ww/2,d=cx-ww/2,y=topY+h;return '<path d="M'+a+' '+topY+' L'+b2+' '+topY+' L'+c+' '+y+' L'+d+' '+y+' Z" fill="'+FIG+'"/>';}
function eqf(x1,y1,x2,y2,w){return _seg(x1,y1,x2,y2,w||9,EQF);}
function eql(x1,y1,x2,y2,w){return _seg(x1,y1,x2,y2,w||6,EQL);}
function PL(cx,cy,r){r=r||7;return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+WGT+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+(r*.42).toFixed(1)+'" fill="'+WGT2+'"/>';}
function BAR(x1,x2,y){return '<rect x="'+x1+'" y="'+(y-3)+'" width="'+(x2-x1)+'" height="6" rx="3" fill="'+WGT+'"/>'+PL(x1,y)+PL(x2,y);}
function DB(cx,cy){return '<rect x="'+(cx-9)+'" y="'+(cy-2.5)+'" width="18" height="5" rx="2.5" fill="'+WGT+'"/>'+PL(cx-9,cy,5.5)+PL(cx+9,cy,5.5);}
function KB(cx,cy){return '<path d="M'+(cx-3)+' '+(cy-4)+' a3 3 0 016 0" fill="none" stroke="'+WGT2+'" stroke-width="2.4"/><circle cx="'+cx+'" cy="'+(cy+3)+'" r="6.5" fill="'+WGT+'"/>';}

/* =========================================================
   SKELETAL RIG  ·  one jointed figure, every pose = joint angles
   - Neutral pose: standing, facing right, all segments vertical.
   - Each joint is a nested <g> that rotates around its pivot.
   - A pose gives each joint a start angle (A, top of rep) and an
     end angle (B, bottom of rep); both keyframes animate in sync,
     so children stay attached to their parent joint automatically.
   - SVG rotate is clockwise (y is down). Facing right:
       arm/leg hang straight down at neutral (0).
       negative angle swings forward/up, positive swings back.
   ========================================================= */
const J={ P:[57,87], S:[57,55], H:[59,42], E:[57,75], W:[57,93], K:[57,109], A:[57,128] };
/* all rep animations share a 4-key rhythm: lower, brief hold at the
   bottom, lift, brief rest at the top — reads like a controlled rep */
const KT='keyTimes="0;0.42;0.56;1" dur="', KS='s" calcMode="spline" keySplines="0.5 0 0.4 1;0 0 1 1;0.3 0 0.4 1" repeatCount="indefinite"/>';
function jr(jx,jy,a,b,d,inner){
  a=a||0; b=(b===undefined||b===null)?a:b;
  if(a===b) return a===0?inner:'<g transform="rotate('+a+' '+jx+' '+jy+')">'+inner+'</g>';
  const A=a+' '+jx+' '+jy, B=b+' '+jx+' '+jy;
  return '<g><animateTransform attributeName="transform" attributeType="XML" type="rotate" '
    +'values="'+A+';'+B+';'+B+';'+A+'" '+KT+d+KS+inner+'</g>';
}
/* animated whole-body translate: 0 -> (dx,dy) -> 0 in sync with joints */
function jt(dx,dy,d,inner){
  dx=dx||0; dy=dy||0;
  if(!dx&&!dy) return inner;
  return '<g><animateTransform attributeName="transform" attributeType="XML" type="translate" '
    +'values="0 0;'+dx+' '+dy+';'+dx+' '+dy+';0 0" '+KT+d+KS+inner+'</g>';
}
/* telescoping press: scale Y about a pivot so a limb compresses straight
   down (bar/weight stays level and travels vertically, no awkward fold). */
function jscale(cx,cy,syB,d,inner){
  return '<g transform="translate('+cx+' '+cy+')"><g>'
    +'<animateTransform attributeName="transform" attributeType="XML" type="scale" '
    +'values="1 1;1 '+syB+';1 '+syB+';1 1" '+KT+d+KS
    +'<g transform="translate('+(-cx)+' '+(-cy)+')">'+inner+'</g></g></g>';
}
/* horizontal telescope: same idea, compresses X toward the pivot */
function jscaleX(cx,cy,sxB,d,inner){
  return '<g transform="translate('+cx+' '+cy+')"><g>'
    +'<animateTransform attributeName="transform" attributeType="XML" type="scale" '
    +'values="1 1;'+sxB+' 1;'+sxB+' 1;1 1" '+KT+d+KS
    +'<g transform="translate('+(-cx)+' '+(-cy)+')">'+inner+'</g></g></g>';
}
/* one arm chain: shoulder -> elbow -> wrist (+ optional weight in hand).
   g = {shA,shB,elA,elB,load,fill}.  wt suppresses weights when false. */
function _arm(g,d,wt){
  const S=J.S,E=J.E,W=J.W, f=g.fill||FIG;
  const spA=g.spA||0, spB=(g.spB===undefined?spA:g.spB);
  const shA=g.shA||0, shB=(g.shB===undefined?shA:g.shB);
  const elA=g.elA||0, elB=(g.elB===undefined?elA:g.elB);
  let hand='';
  if(wt&&g.load){
    const raw=g.load==='db'?DB(W[0],W[1]):g.load==='kb'?KB(W[0],W[1]):g.load==='bar'?BAR(W[0]-15,W[0]+15,W[1]):'';
    // keep the weight parallel to the floor: counter the cumulative parent rotation
    hand=jr(W[0],W[1], -(spA+shA+elA), -(spB+shB+elB), d, raw);
  }
  const fore=_seg(E[0],E[1],W[0],W[1],7,f)+hand;
  return jr(S[0],S[1],shA,shB,d, _seg(S[0],S[1],E[0],E[1],7.5,f)+jr(E[0],E[1],elA,elB,d,fore));
}
/* one leg chain: hip -> knee -> ankle (+ foot).  g = {hipA,hipB,knA,knB,fill} */
function _leg(g,d){
  const P=J.P,K=J.K,A=J.A, f=g.fill||FIG;
  const foot='<path d="M'+A[0]+' '+A[1]+' L'+(A[0]+12)+' '+A[1]+'" stroke="'+f+'" stroke-width="6.5" stroke-linecap="round"/>';

/* =========================================================
   PROGRAM BUILDING  (no repeated muscle part within a day)
   ========================================================= */
/* Day templates list exactly four main slots the way a coach would write
   them: big muscles get more slots, arms get one, and a repeated muscle in
   one day always hits a different part of it. Slot spec:
   {g: group or [groups], part: substring to prefer, t: 1 allows toning} */
function buildSplit(){
  const goal=emphasisOf(state.goal),d=state.days;
  const s=(g,part,t)=>({g:g,part:part||null,t:t||0});
  const PUSH={name:'Push',region:'upper',slots4:[s('chest'),s('chest'),s('shoulders'),s('triceps')]};
  const PULL={name:'Pull',region:'upper',slots4:[s('back'),s('back'),s('shoulders','Rear',1),s('biceps')]};
  const UPPER={name:'Upper Body',region:'upper',slots4:[s('chest'),s('back'),s('shoulders'),s(['biceps','triceps'])]};
  const LOWER={name:'Lower Body',region:'lower',slots4:[s('quads'),s('hamstrings'),s('glutes'),s('calves',null,1)]};
  const LEGSG={name:'Legs and Glutes',region:'lower',slots4:[s('glutes'),s('quads'),s('hamstrings'),s('glutes',null,1)]};
  const FULL={name:'Full Body',region:'full',slots4:[s('quads'),s('chest'),s('back'),s('hamstrings')]};
  const SHARM={name:'Shoulders and Arms',region:'upper',slots4:[s('shoulders'),s('shoulders'),s('biceps'),s('triceps')]};
  const GLUTEF={name:'Glute Focus',region:'lower',slots4:[s('glutes'),s('glutes',null,1),s('hamstrings'),s('quads')]};
  const HAMC={name:'Hamstrings and Calves',region:'lower',slots4:[s('hamstrings'),s('glutes'),s('calves',null,1),s('quads')]};
  const ARMSH={name:'Arms and Shoulders',region:'upper',slots4:[s('biceps'),s('triceps'),s('shoulders'),s('shoulders')]};
  let p=[];
  if(d===1)p=[FULL];
  else if(d===2)p=goal==='lower'?[LOWER,UPPER]:[UPPER,LOWER];
  else if(d===3){if(goal==='upper')p=[PUSH,LOWER,PULL];else if(goal==='lower')p=[LOWER,UPPER,LEGSG];else p=[PUSH,PULL,LOWER];}
  else if(d===4){if(goal==='upper')p=[PUSH,LOWER,PULL,UPPER];else if(goal==='lower')p=[LOWER,UPPER,LEGSG,HAMC];else p=[PUSH,LOWER,PULL,LEGSG];}
  else if(d===5){if(goal==='upper')p=[PUSH,PULL,LOWER,SHARM,UPPER];
    else if(goal==='lower')p=[LEGSG,UPPER,GLUTEF,LOWER,HAMC];
    else p=[PUSH,PULL,LOWER,SHARM,LEGSG];}
  else {if(goal==='lower')p=[LEGSG,UPPER,GLUTEF,PUSH,HAMC,PULL];
    else if(goal==='upper')p=[PUSH,PULL,LOWER,PUSH,PULL,ARMSH];
    else p=[PUSH,PULL,LOWER,PUSH,PULL,LOWER];}
  return p;
}

function fillDay(tpl,gParts,gIds,prevIds){
  const slots=[],usedParts=new Set();
  function pickFor(spec){
    const gs=Array.isArray(spec.g)?spec.g:[spec.g];
    let pool=EX.filter(e=>gs.includes(e.group)&&haveEquip(e)&&!usedParts.has(e.part)&&(spec.t||!e.toning));
    if(spec.part){const pp=pool.filter(e=>e.part.indexOf(spec.part)>=0);if(pp.length)pool=pp;}
    if(!pool.length)return null;
    // when the user owns gear, prefer loaded exercises over bodyweight ones
    if(state.equip.size>1){const eq=pool.filter(e=>e.need.length);if(eq.length)pool=eq;}
    // avoid repeating an exercise already in the program this week
    const unseen=pool.filter(e=>!gIds.has(e.id));
    if(unseen.length)pool=unseen;
    // a reshuffle should feel fresh: steer away from last program's picks
    const novel=pool.filter(e=>!prevIds.has(e.id));
    if(novel.length)pool=novel;
    let fresh=pool.filter(e=>!gParts.has(e.part));
    let cand=fresh.length?fresh:pool;
    // give favorited exercises a strong pull when one fits this slot
    const favs=cand.filter(e=>isFav(e.id));
    if(favs.length&&Math.random()<0.8)return rand(favs);
    // lead the day with big compound lifts, then let isolation work in
    if(slots.length<2){const comps=cand.filter(e=>e.compound);if(comps.length)cand=comps;}
    // balance modalities so a full gym actually uses its machines
    const mm=cand.filter(e=>e.need.some(n=>MACHK.includes(n)));
    const ff=cand.filter(e=>!e.need.some(n=>MACHK.includes(n)));
    if(mm.length&&ff.length)cand=Math.random()<0.4?mm:ff;
    return rand(cand);
  }
  const take=e=>{slots.push(e.id);usedParts.add(e.part);gParts.add(e.part);gIds.add(e.id);};
  for(const spec of tpl.slots4){const e=pickFor(spec);if(e)take(e);}
  // if gear is too limited for a slot, fill from the day region, capping
  // any muscle at two slots and arms at one
  if(slots.length<4){
    const gcount={};slots.forEach(id=>{const g=exById(id).group;gcount[g]=(gcount[g]||0)+1;});
    const pool=shuffle(EX.filter(e=>(tpl.region==='full'||e.region===tpl.region)&&haveEquip(e)&&!e.toning&&!usedParts.has(e.part)&&!slots.includes(e.id)));
    for(const e of pool){
      if(slots.length>=4)break;
      const cap=(e.group==='biceps'||e.group==='triceps')?1:2;
      const c=gcount[e.group]||0;
      if(c>=cap||usedParts.has(e.part))continue;
      gcount[e.group]=c+1;take(e);
    }
  }
  // core + toning finishers rotate through the week and avoid muscles
  // already trained today
  const pickExtra=list=>{if(!list.length)return null;
    if(state.equip.size>1){const eq=list.filter(e=>e.need.length);if(eq.length)list=eq;}
    const unseen=list.filter(e=>!gIds.has(e.id));if(unseen.length)list=unseen;
    const novel=list.filter(e=>!prevIds.has(e.id));return rand(novel.length?novel:list);};
  const dayGroups=slots.map(id=>exById(id).group);
  const core=pickExtra(EX.filter(e=>e.group==='core'&&haveEquip(e)&&!usedParts.has(e.part)));
  if(core){slots.push(core.id);usedParts.add(core.part);gIds.add(core.id);}
  const tone=pickExtra(EX.filter(e=>(e.toning||['calves','forearms','lowerback'].includes(e.group))&&haveEquip(e)&&!usedParts.has(e.part)&&dayGroups.indexOf(e.group)===-1&&(tpl.region==='full'||e.region===tpl.region)));
  if(tone){slots.push(tone.id);usedParts.add(tone.part);gIds.add(tone.id);}
  return {name:tpl.name,region:tpl.region,slots};
}
function generateRoutine(){
  const prev=new Set(state.routine?state.routine.flatMap(d=>d.slots):[]);
  const g=new Set(),ids=new Set();
  state.routine=buildSplit().map(t=>fillDay(t,g,ids,prev));
  state.activeDay=0;save();
}

function coach(ex,w,r){
  const {min,max}=repRange(ex);
  if(r<min){
    return {t:'warn',i:'Go lighter',m:w>0
      ? 'You got '+r+' reps but the target is '+min+' to '+max+'. The weight is a little too heavy right now. Take it down a notch next set so you can hit at least '+min+' clean reps. More reps in the right range builds more muscle than grinding out fewer heavy ones.'

  }
  if(r>max){

    const id=b.dataset.log,si=b.dataset.si,ex=exById(id),mode=exMetric(ex);
    let entry={t:Date.now()},okMsg;
    if(mode==='secs'){const s=+($('#s-'+si).value);if(!s){toast('Enter how many seconds you held');return;}entry.secs=s;advice[id]=coachTimed(ex,s);okMsg=s+' sec';}
    else if(mode==='reps'){const r=+($('#r-'+si).value);if(!r){toast('Enter how many reps you did');return;}entry.w=0;entry.reps=r;advice[id]=coach(ex,0,r);okMsg=r+' reps';}
    else{const r=+($('#r-'+si).value);const wv=$('#w-'+si).value,w=(wv===''||+wv<0)?0:+wv;if(!r){toast('Enter how many reps you did');return;}entry.w=w;entry.reps=r;advice[id]=coach(ex,w,r);okMsg=(w?w+' lb x ':'')+r+(w?'':' reps');}
    logs[id]=logs[id]||[];logs[id].push(entry);saveLogs();
    const setsNow=todayCount(id),target=setsReps(ex).sets;
    if(setsNow<target)startRest(currentRest(ex));else stopRest();
    toast(setsNow>=target?ex.name+' done for today':'Logged '+okMsg);
    renderDay();
  });
  $$('#dayContent [data-swap]').forEach(b=>b.onclick=()=>toggleSwap(+b.dataset.swap));
  $$('#dayContent .tin').forEach(inp=>inp.onkeydown=e=>{
    if(e.key==='Enter'){const si=inp.id.split('-')[1];const btn=$('#dayContent').querySelector('[data-log][data-si="'+si+'"]');if(btn)btn.click();}
  });
}
function toggleSwap(si){
  const menu=$('#sm-'+si),open=menu.classList.contains('open');
  $$('.swap-menu.open').forEach(m=>m.classList.remove('open'));
  if(open)return;
  const day=state.routine[state.activeDay],cur=exById(day.slots[si]);
  let alts=availableFor(cur.group).filter(e=>e.id!==cur.id&&!day.slots.includes(e.id));
  if(alts.length<2){const sr=EX.filter(e=>e.region===cur.region&&haveEquip(e)&&e.id!==cur.id&&!day.slots.includes(e.id));const s=new Set();alts=alts.concat(sr).filter(e=>s.has(e.id)?false:(s.add(e.id),true));}
  if(!alts.length){menu.innerHTML='<div class="smh">No alternatives for your gear</div><div style="padding:8px;color:var(--ink-2);font-size:13px">Add more equipment to unlock other options for this muscle.</div>';}
  else{alts.sort((a,b)=>(isFav(b.id)?2:0)+(b.need.length?1:0)-((isFav(a.id)?2:0)+(a.need.length?1:0)));
    menu.innerHTML='<div class="smh">Pick one you would rather do</div>'+alts.slice(0,8).map(a=>{
    const eq=a.need.length?a.need.map(n=>EQUIPMENT.find(e=>e.id===n).name).join(' + '):'Bodyweight';
    return '<div class="so" data-alt="'+a.id+'"><div class="sf">'+poseSvg(a.pose,46,a.need.length>0,loadOf(a))+'</div><div><div class="sn">'+(isFav(a.id)?'★ ':'')+a.name+'</div><div class="se">'+a.part+' · '+eq+'</div></div></div>';
  }).join('');
    $$('#sm-'+si+' .so').forEach(o=>o.onclick=()=>{day.slots[si]=o.dataset.alt;save();renderDay();toast('Swapped in '+exById(o.dataset.alt).name);});}
  menu.classList.add('open');
}

/* ---- PROGRESS ---- */
function lineChart(arr,key){
  const ws=arr.map(x=>x[key]||0),mn=Math.min(...ws),mx=Math.max(...ws),rng=mx-mn||1;
  const W=260,H=70,n=ws.length;
  const px=i=>n===1?W/2:(i/(n-1))*(W-12)+6;
  const py=w=>H-8-((w-mn)/rng)*(H-20);
  let d='';ws.forEach((v,i)=>{d+=(i?'L':'M')+px(i).toFixed(1)+' '+py(v).toFixed(1)+' ';});
  let dots=ws.map((v,i)=>'<circle cx="'+px(i).toFixed(1)+'" cy="'+py(v).toFixed(1)+'" r="2.8" fill="#df5a2a"/>').join('');
  let area='M'+px(0).toFixed(1)+' '+H+' '+d.replace('M','L')+'L'+px(n-1).toFixed(1)+' '+H+' Z';
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="margin-top:8px"><path d="'+area+'" fill="rgba(223,90,42,.10)"/><path d="'+d+'" fill="none" stroke="#df5a2a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';
}
function weightTracker(){
  const bw=state.bwlog,p=state.profile;
  const cur=bw.length?bw[bw.length-1].w:(+p.weightLb||null);
  const start=bw.length?bw[0].w:cur;
  const change=(cur!=null&&start!=null)?Math.round((cur-start)*10)/10:0;
  const goal=+p.goalWeight||null;
  let goalHtml='';
  if(goal&&start&&goal!==start){
    const losing=goal<start;
    const done=losing?Math.max(0,start-cur):Math.max(0,cur-start);
    const total=Math.abs(goal-start);
    const pct=Math.max(0,Math.min(100,Math.round(100*done/total)));
    const toGo=Math.round(Math.abs(cur-goal)*10)/10;
    const reached=losing?cur<=goal:cur>=goal;
    goalHtml='<div class="goalprog"><div class="gp-top"><span>'+(reached?'Goal reached 🎉':toGo+' lb to '+(losing?'lose':'gain'))+'</span><span>'+pct+'%</span></div>'+
      '<div class="gp-bar"><i style="width:'+pct+'%"></i></div>'+
      '<div class="gp-lab"><span>Start '+start+'</span><span>Goal '+goal+'</span></div></div>';
  }
  const arrow=change<0?'▼':change>0?'▲':'';
  const chgCls=change<0?'down':change>0?'up':'';
  const chart=bw.length>1?lineChart(bw.map(x=>({w:x.w})),'w'):'<div class="wt-empty">Log your weight a few times and your trend line shows up here.</div>';
  return '<div class="wtrack">'+
    '<div class="wt-h">Weight tracker</div>'+
    '<div class="wt-now"><div class="wt-cur"><b>'+(cur!=null?cur:'--')+'</b><span>lb now</span></div>'+
      (bw.length>1?'<div class="wt-chg '+chgCls+'">'+arrow+' '+Math.abs(change)+' lb<span>since start</span></div>':'')+'</div>'+
    '<div class="wt-row"><input class="pin" id="wt-in" type="number" inputmode="decimal" placeholder="log today\'s weight"><button class="wlog" id="wt-log">Log</button></div>'+
    '<div class="wt-row"><input class="pin" id="wt-goal" type="number" inputmode="decimal" placeholder="goal weight (lb)" value="'+(p.goalWeight||'')+'"><button class="wlog ghostbtn" id="wt-setgoal">Set goal</button></div>'+
    goalHtml+chart+
  '</div>';
}
function renderProgress(){
  const ids=Object.keys(logs).filter(id=>logs[id]&&logs[id].length&&exById(id));
  let h=weightTracker();
  if(ids.length){
    ids.sort((a,b)=>logs[b][logs[b].length-1].t-logs[a][logs[a].length-1].t);
    const wdays=new Set(),wweek=new Set(),now=Date.now();
    ids.forEach(id=>logs[id].forEach(x=>{const k=dayKey(x.t);wdays.add(k);if(now-x.t<7*864e5)wweek.add(k);}));
    h+='<div class="klabel">Your lifts</div>';
    h+='<div class="stats">'
      +'<div class="stat"><b>'+wdays.size+'</b><span>workout'+(wdays.size!==1?'s':'')+' total</span></div>'
      +'<div class="stat"><b>'+wweek.size+'</b><span>this week</span></div>'
      +'<div class="stat"><b>'+ids.length+'</b><span>lifts tracked</span></div></div>';
    ids.forEach(id=>{
      const ex=exById(id),arr=logs[id],best=bestOf(id),last=arr[arr.length-1],first=arr[0];
      const m=exMetric(ex),unit=m==='secs'?' sec':m==='reps'?' reps':' lb';
      const gain=(last[m]||0)-(first[m]||0);
      h+='<div class="pcard"><div class="ph"><div class="pn">'+ex.name+'</div><div class="pb">best <b>'+(best[m]||0)+'</b>'+unit+'</div></div>'+
        '<div class="pb" style="color:var(--ink-2)">'+arr.length+' session'+(arr.length>1?'s':'')+(gain>0?', up '+gain+unit+' since you started':'')+'</div>'+
        lineChart(arr,m)+'</div>';
    });
  }else{
    h+='<div class="empty" style="padding:36px 24px 20px"><div class="ei2"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9a9385" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M8 16l3-4 3 2 4-6"/></svg></div><h3>No lifts logged yet</h3><p>Head to Train, log the sets you hit, and your lifts will show up here climbing over time.</p></div>';
  }
  $('#view').innerHTML=h;
  const logW=()=>{
    const v=+$('#wt-in').value;if(!v){toast('Enter your weight first');return;}
    state.profile.weightLb=String(v);const k=dayKey(Date.now());
    const ex=state.bwlog.find(x=>dayKey(x.t)===k);
    if(ex)ex.w=v;else state.bwlog.push({t:Date.now(),w:v});
    save();renderProgress();toast('Weight logged: '+v+' lb');
  };
  $('#wt-log').onclick=logW;
  $('#wt-in').onkeydown=e=>{if(e.key==='Enter')logW();};
  const setGoal=()=>{state.profile.goalWeight=$('#wt-goal').value;save();renderProgress();toast(state.profile.goalWeight?'Goal set: '+state.profile.goalWeight+' lb':'Goal cleared');};
  $('#wt-setgoal').onclick=setGoal;
  $('#wt-goal').onkeydown=e=>{if(e.key==='Enter')setGoal();};
}

/* ---- TOAST ---- */
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ---- INIT ---- */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
load();
$('#rest').onclick=stopRest;
state.tab = 'home';
render();
</script>
